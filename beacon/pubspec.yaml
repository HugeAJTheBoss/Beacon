name: beacon
description: "Beacon - Find STEM opportunities near you."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/beacon_app_bar.png
    - assets/beacon_logo.png
    - assets/stem_logo_placeholder.jpg
    - assets/google_logo.png
    - assets/ms_logo.png
    - assets/apple_logo.png
    - assets/robotics_club.png
    - assets/volunteering_club.png
    - assets/club.png
